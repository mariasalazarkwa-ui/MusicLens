<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MusicLens — Artist</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ff2d2d44; border-radius: 2px; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Share Tech Mono', monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TITLEBAR ── */
    .titlebar {
      -webkit-app-region: drag;
      flex-shrink: 0;
      padding: 12px 16px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      color: #ff2d2d;
      letter-spacing: 3px;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    .close-btn:hover { color: #ff2d2d; }

    /* ── ARTIST IMAGE ── */
    .artist-image-wrap {
      flex-shrink: 0;
      position: relative;
      height: 260px;
      overflow: hidden;
      background: #111;
    }

    .artist-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
      filter: grayscale(100%) contrast(1.2) brightness(0.75);
    }

    /* gradient fade to black at bottom */
    .artist-image-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(10,10,10,0.6) 70%,
        #0a0a0a 100%
      );
      pointer-events: none;
    }

    /* artist name overlaid on image */
    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 24px 16px;
      z-index: 2;
    }

    .artist-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: #fff;
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 6px;
    }

    .track-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .track-pill .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ff2d2d;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .track-pill .track-name { color: #666; }

    /* ── HERO (no image fallback) ── */
    .hero {
      flex-shrink: 0;
      padding: 28px 24px 20px;
      border-bottom: 1px solid #111;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, #ff2d2d44, transparent);
    }

    /* ── SCROLL CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 40px;
    }

    /* ── SECTIONS ── */
    .section {
      padding: 24px 0;
      border-bottom: 1px solid #111;
    }
    .section:last-child { border-bottom: none; }

    .section-label {
      font-size: 9px;
      color: #ff2d2d;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-body {
      font-size: 13px;
      color: #bbb;
      line-height: 1.75;
    }

    /* list sections: ESSENTIAL LISTENING, IF YOU LIKE THIS */
    .section-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-list li {
      font-size: 13px;
      color: #bbb;
      line-height: 1.6;
      padding-left: 12px;
      border-left: 2px solid #222;
    }

    .section-list li strong {
      color: #e8e8e8;
      display: block;
      margin-bottom: 1px;
    }

    /* pull quote */
    .pull-quote {
      font-size: 15px;
      color: #e8e8e8;
      line-height: 1.7;
      font-style: italic;
      padding-left: 16px;
      border-left: 2px solid #ff2d2d;
    }

    .pull-quote-attr {
      margin-top: 8px;
      font-size: 10px;
      color: #444;
      letter-spacing: 1px;
      font-style: normal;
    }

    /* ── LOADING ── */
    .loading {
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .loading-bar {
      height: 10px;
      background: #111;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #ff2d2d22, transparent);
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .loading-bar:nth-child(2) { width: 80%; }
    .loading-bar:nth-child(3) { width: 65%; animation-delay: 0.2s; }
    .loading-bar:nth-child(4) { width: 90%; animation-delay: 0.4s; }

    @keyframes shimmer {
      to { left: 100%; }
    }

    .error {
      padding: 32px 0;
      font-size: 11px;
      color: #ff2d2d44;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="titlebar">
    <span class="logo">BRIT FM</span>
    <button class="close-btn" id="closeBtn">✕</button>
  </div>

  <!-- Populated by JS once image URL is known -->
  <div id="heroWrap"></div>

  <div class="content" id="content">
    <div class="loading">
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://musiclens-production-2d7b.up.railway.app';
    const SECTIONS = ['WHO THEY ARE', 'THE SOUND', 'MUSIC HISTORY', 'RELEVANCE NOW', 'ESSENTIAL LISTENING', 'IF YOU LIKE THIS', 'PULL QUOTE'];
    const LIST_SECTIONS = new Set(['ESSENTIAL LISTENING', 'IF YOU LIKE THIS']);

    const params = new URLSearchParams(window.location.search);
    const artist = params.get('artist') || 'Unknown Artist';
    const track  = params.get('track')  || '';
    const album  = params.get('album')  || '';

    document.getElementById('closeBtn').addEventListener('click', () => {
      if (window.musiclens) window.musiclens.closeArtistPage();
      else window.close();
    });

    function renderHero(imageUrl) {
      const heroWrap = document.getElementById('heroWrap');
      const trackLabel = track + (album ? ` — ${album}` : '');

      if (imageUrl) {
        heroWrap.innerHTML = `
          <div class="artist-image-wrap">
            <img class="artist-image" src="${imageUrl}" alt="${artist}" />
            <div class="hero-overlay">
              <div class="artist-name">${artist.toUpperCase()}</div>
              <div class="track-pill">
                <div class="dot"></div>
                <span>NOW PLAYING</span>
                <span class="track-name">${trackLabel}</span>
              </div>
            </div>
          </div>
        `;
      } else {
        heroWrap.innerHTML = `
          <div class="hero">
            <div class="artist-name">${artist.toUpperCase()}</div>
            <div class="track-pill">
              <div class="dot"></div>
              <span>NOW PLAYING</span>
              <span class="track-name">${trackLabel}</span>
            </div>
          </div>
        `;
      }
    }

    function parseProfile(text) {
      const sections = [];
      let current = null;
      let lines = [];

      for (const line of text.split('\n')) {
        const t = line.trim();
        if (SECTIONS.includes(t)) {
          if (current) sections.push({ header: current, body: lines.join('\n').trim() });
          current = t; lines = [];
        } else if (current) {
          lines.push(line);
        }
      }
      if (current) sections.push({ header: current, body: lines.join('\n').trim() });
      return sections;
    }

    function renderSection(s) {
      if (s.header === 'PULL QUOTE') {
        const lines = s.body.split('\n').map(l => l.trim()).filter(Boolean);
        const quoteLine = lines[0] || '';
        const attrLine = lines[1] || '';
        const quoteText = quoteLine.replace(/^[""]|[""]$/g, '');
        return `
          <div class="section">
            <div class="section-label">${s.header}</div>
            <div class="pull-quote">"${quoteText}"</div>
            ${attrLine ? `<div class="pull-quote-attr">— ${attrLine.replace(/^—\s*/, '')}</div>` : ''}
          </div>`;
      }

      if (LIST_SECTIONS.has(s.header)) {
        const items = s.body.split('\n').map(l => l.trim()).filter(Boolean);
        const listHtml = items.map(item => {
          const dash = item.indexOf(' — ');
          if (dash === -1) return `<li>${item}</li>`;
          const title = item.slice(0, dash);
          const desc  = item.slice(dash + 3);
          return `<li><strong>${title}</strong>${desc}</li>`;
        }).join('');
        return `
          <div class="section">
            <div class="section-label">${s.header}</div>
            <ul class="section-list">${listHtml}</ul>
          </div>`;
      }

      return `
        <div class="section">
          <div class="section-label">${s.header}</div>
          <div class="section-body">${s.body.replace(/\n\n/g, '</p><p>').replace(/\n/g, ' ')}</div>
        </div>`;
    }

    async function load() {
      try {
        const url = `${API_BASE}/artist?artist=${encodeURIComponent(artist)}&track=${encodeURIComponent(track)}&album=${encodeURIComponent(album)}`;
        const res  = await fetch(url);
        const data = await res.json();

        if (data.error) {
          renderHero(null);
          document.getElementById('content').innerHTML =
            `<div class="error">// ${data.error}</div>`;
          return;
        }

        renderHero(data.imageUrl || null);

        const sections = parseProfile(data.profile);
        const html = sections.length
          ? sections.map(s => renderSection(s)).join('')
          : `<div class="section"><div class="section-body">${data.profile}</div></div>`;

        document.getElementById('content').innerHTML = html;
      } catch (err) {
        renderHero(null);
        document.getElementById('content').innerHTML =
          `<div class="error">// NO SIGNAL — ${err.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
