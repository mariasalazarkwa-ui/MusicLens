<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MusicLens" />
  <link rel="manifest" href="manifest.json" />
  <title>MusicLens</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

    :root {
      --red: #ff2d2d;
      --orange: #ff7a00;
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #555;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* HEADER */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--red);
      letter-spacing: 4px;
    }
    .auth-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      background: none;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 4px 10px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .auth-btn:active { background: var(--red); color: #000; }

    /* TABS */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Share Tech Mono', monospace;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--red); border-bottom-color: var(--red); }

    /* PANEL */
    .panel { display: none; flex: 1; overflow-y: auto; padding: 20px; }
    .panel.active { display: block; }

    /* NOW PLAYING */
    .now-playing-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--red);
      padding: 16px;
      margin-bottom: 16px;
    }
    .album-art-wrap { text-align: center; margin-bottom: 16px; }
    .album-art {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: #1a1a1a;
    }
    .track-title {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 4px;
    }
    .track-artist { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .progress-bar { height: 2px; background: #222; margin-bottom: 12px; }
    .progress-fill { height: 100%; background: var(--red); }

    .idle-msg {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 0;
      letter-spacing: 1px;
    }

    /* BUTTONS */
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--red);
      background: none;
      color: var(--red);
      margin-bottom: 8px;
    }
    .btn:active { background: var(--red); color: #000; }
    .btn.loading { opacity: 0.5; pointer-events: none; }

    /* INSIGHT */
    .insight-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--orange);
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #bbb;
      margin-top: 10px;
      white-space: pre-wrap;
      display: none;
    }
    .insight-box.visible { display: block; }

    /* RECOGNIZE */
    .recognize-area { text-align: center; padding: 30px 0; }
    .mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid var(--red);
      background: none;
      color: var(--red);
      font-size: 32px;
      cursor: pointer;
      margin-bottom: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .mic-btn:active, .mic-btn.listening { background: var(--red); color: #000; }
    .rec-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--red);
      padding: 14px;
      margin-top: 16px;
      display: none;
    }
    .result-card.visible { display: block; }
    .result-card .track-title { font-size: 15px; }

    /* HISTORY */
    .history-item {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .history-item:last-child { border-bottom: none; }
    .history-track { font-size: 13px; color: #fff; }
    .history-artist { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .history-insight { font-size: 11px; color: #777; line-height: 1.5; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--red); }

    .tag {
      display: inline-block;
      font-size: 9px;
      padding: 2px 6px;
      border: 1px solid var(--muted);
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* USER PICKER OVERLAY */
    .user-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
    }
    .user-overlay.hidden { display: none; }
    .user-overlay .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--red);
      letter-spacing: 6px;
      margin-bottom: 8px;
    }
    .user-overlay .sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .user-overlay input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--red);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      padding: 12px 14px;
      letter-spacing: 1px;
      outline: none;
      margin-bottom: 12px;
    }
    .user-overlay input::placeholder { color: var(--muted); }
    .user-list { width: 100%; margin-bottom: 12px; }
    .user-chip {
      display: inline-block;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      margin: 4px 4px 0 0;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .user-chip:active { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
<!-- USER PICKER -->
<div class="user-overlay" id="userOverlay">
  <div class="logo">MUSICLENS</div>
  <div class="sub">who are you?</div>
  <input id="usernameInput" type="text" placeholder="enter your name..." autocomplete="off" autocapitalize="none" />
  <button class="btn" onclick="setUser()">ENTER</button>
</div>

<div class="app">
  <div class="topbar">
    <span class="logo">MUSICLENS</span>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="currentUserLabel" style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase"></span>
      <button class="auth-btn" id="authBtn" onclick="startAuth()">CONNECT</button>
      <button class="auth-btn" onclick="switchUser()" style="border-color:var(--muted);color:var(--muted)">SW</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('now')">NOW</button>
    <button class="tab" onclick="switchTab('lens')">LENS</button>
    <button class="tab" onclick="switchTab('scan')">SCAN</button>
    <button class="tab" onclick="switchTab('log')">LOG</button>
  </div>

  <!-- NOW PLAYING -->
  <div class="panel active" id="panel-now">
    <div id="nowContent">
      <div class="idle-msg">// NO SIGNAL //<br><br>Open Spotify and play something.</div>
    </div>
    <button class="btn" id="refreshBtn" onclick="loadNowPlaying()">REFRESH</button>
  </div>

  <!-- LENS (AI INSIGHT) -->
  <div class="panel" id="panel-lens">
    <div class="tag">AI INSIGHT</div>
    <div id="lensTrackInfo" style="margin-bottom:12px; color: var(--muted); font-size:12px;">Load a track first →</div>
    <button class="btn" id="insightBtn" onclick="getInsight()">GET LENS</button>
    <div class="insight-box" id="insightBox"></div>
  </div>

  <!-- SCAN (AudD) -->
  <div class="panel" id="panel-scan">
    <div class="recognize-area">
      <div class="tag">SONG RECOGNITION</div><br>
      <button class="mic-btn" id="micBtn" onclick="recognize()">♪</button><br>
      <div class="rec-label" id="recLabel">TAP TO SCAN</div>
    </div>
    <div class="result-card" id="resultCard"></div>
  </div>

  <!-- LOG (history) -->
  <div class="panel" id="panel-log">
    <div class="tag">INSIGHT LOG</div>
    <div id="historyList" style="margin-top:12px;">
      <div class="idle-msg" style="padding:20px 0;">No entries yet.</div>
    </div>
  </div>
</div>

<script>
  const API = 'https://musiclens-production-2d7b.up.railway.app';
  let currentTrack = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let currentUser = localStorage.getItem('ml_user') || null;

  // --- User picker ---
  async function initUserPicker() {
    if (currentUser) {
      showApp();
      return;
    }
    document.getElementById('userOverlay').classList.remove('hidden');
    document.getElementById('usernameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') setUser();
    });
  }

  function setUser() {
    const val = document.getElementById('usernameInput').value.trim().toLowerCase();
    if (!val) return;
    currentUser = val;
    localStorage.setItem('ml_user', val);
    showApp();
  }

  function showApp() {
    document.getElementById('userOverlay').classList.add('hidden');
    document.getElementById('currentUserLabel').textContent = currentUser;
    loadNowPlaying();
  }

  function switchUser() {
    currentUser = null;
    localStorage.removeItem('ml_user');
    location.reload();
  }

  // --- Tab switching ---
  function switchTab(id) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['now','lens','scan','log'][i] === id);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    if (id === 'log') loadHistory();
  }

  // --- Auth ---
  function startAuth() {
    window.open(`${API}/auth?user=${encodeURIComponent(currentUser)}`, '_blank');
  }

  // --- Now Playing ---
  async function loadNowPlaying() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    btn.textContent = 'SCANNING...';
    try {
      const res = await fetch(`${API}/now-playing?user=${encodeURIComponent(currentUser)}`);
      const data = await res.json();
      renderNowPlaying(data);
      if (data.playing) {
        currentTrack = data;
        document.getElementById('lensTrackInfo').textContent =
          `"${data.track}" — ${data.artist}`;
      }
    } catch {
      document.getElementById('nowContent').innerHTML =
        '<div class="idle-msg">// BACKEND OFFLINE //<br><br>Start the backend server.</div>';
    } finally {
      btn.classList.remove('loading');
      btn.textContent = 'REFRESH';
    }
  }

  function renderNowPlaying(data) {
    const el = document.getElementById('nowContent');
    if (!data.playing) {
      el.innerHTML = '<div class="idle-msg">// PAUSED //</div>';
      return;
    }
    const pct = data.duration_ms ? ((data.progress_ms / data.duration_ms) * 100).toFixed(1) : 0;
    el.innerHTML = `
      <div class="now-playing-card">
        <div class="album-art-wrap">
          <img class="album-art" src="${esc(data.album_art || '')}" alt="" />
        </div>
        <div class="track-title">${esc(data.track)}</div>
        <div class="track-artist">${esc(data.artist)} · ${esc(data.album)}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }

  // --- Insight ---
  async function getInsight() {
    if (!currentTrack) {
      alert('Load a track first (NOW tab → REFRESH)');
      return;
    }
    const btn = document.getElementById('insightBtn');
    const box = document.getElementById('insightBox');
    btn.classList.add('loading');
    btn.textContent = 'PROCESSING...';
    box.classList.remove('visible');
    try {
      const res = await fetch(`${API}/insight`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user: currentUser,
          track: currentTrack.track,
          artist: currentTrack.artist,
          album: currentTrack.album,
        }),
      });
      const data = await res.json();
      box.textContent = data.insight || data.error || 'No signal.';
      box.classList.add('visible');
    } catch {
      box.textContent = 'Backend offline.';
      box.classList.add('visible');
    } finally {
      btn.classList.remove('loading');
      btn.textContent = 'REFRESH LENS';
    }
  }

  // --- Recognize ---
  async function recognize() {
    const btn = document.getElementById('micBtn');
    const label = document.getElementById('recLabel');
    const card = document.getElementById('resultCard');

    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        btn.classList.remove('listening');
        label.textContent = 'SCANNING...';
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const arrayBuffer = await blob.arrayBuffer();
        const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
        try {
          const res = await fetch(`${API}/recognize`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ audio_data: base64 }),
          });
          const data = await res.json();
          if (data.recognized) {
            card.innerHTML = `
              <div class="track-title">${esc(data.track)}</div>
              <div class="track-artist">${esc(data.artist)} · ${esc(data.album || '')}</div>
              ${data.spotify?.album_art ? `<img class="album-art" src="${esc(data.spotify.album_art)}" style="margin-top:10px;width:100px;height:100px;" />` : ''}
            `;
            card.classList.add('visible');
            label.textContent = 'MATCH FOUND';
          } else {
            label.textContent = 'NO MATCH';
          }
        } catch {
          label.textContent = 'ERROR';
        }
      };
      mediaRecorder.start();
      btn.classList.add('listening');
      label.textContent = 'LISTENING... TAP TO STOP';
      setTimeout(() => { if (mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 8000);
    } catch {
      label.textContent = 'MIC ACCESS DENIED';
    }
  }

  // --- History ---
  async function loadHistory() {
    const el = document.getElementById('historyList');
    try {
      const res = await fetch(`${API}/insight/history?user=${encodeURIComponent(currentUser)}&limit=30`);
      const items = await res.json();
      if (!items.length) {
        el.innerHTML = '<div class="idle-msg" style="padding:20px 0;">No entries yet.</div>';
        return;
      }
      el.innerHTML = items.map(item => `
        <div class="history-item">
          <div class="history-track">${esc(item.track)}</div>
          <div class="history-artist">${esc(item.artist)}</div>
          <div class="history-insight">${esc(item.insight)}</div>
        </div>
      `).join('');
    } catch {
      el.innerHTML = '<div class="idle-msg" style="padding:20px 0;">Backend offline.</div>';
    }
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Auto-load on start
  initUserPicker();

  // Register service worker for PWA offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
